const G = (t, c, w, a) => a * Math.exp(-((t - c) ** 2) / (2 * w * w));

  nsr: (t, p) => {
    const a = p.amp || 1;
    return G(t,.09,.012,.15*a) - G(t,.175,.005,.09*a) + G(t,.205,.007,1*a) - G(t,.235,.007,.23*a) + G(t,.385,.031,.26*a);
  },
  stemi_ant: (t, p) => {
    const a = p.amp||1, st = p.st||.42;
    let y = G(t,.09,.012,.1*a) - G(t,.175,.007,.22*a) + G(t,.205,.008,.8*a) - G(t,.235,.007,.05*a);
    if(t>.24&&t<.52) y += st*a*Math.pow(Math.sin(((t-.24)/.28)*Math.PI*.65),.38);
    y += G(t,.44,.047,.58*a);
    return y;
  },
  stemi_inf: (t, p) => {
    const a = p.amp||1;
    let y = G(t,.09,.012,.14*a) - G(t,.175,.006,.15*a) + G(t,.205,.008,.75*a) - G(t,.235,.007,.08*a);
    if(t>.24&&t<.48) y += .35*a*Math.pow(Math.sin(((t-.24)/.24)*Math.PI*.6),.4);
    y += G(t,.42,.042,.50*a);
    return y;
  },
  stemi_lat: (t, p) => {
    const a = p.amp||1;
    let y = G(t,.09,.012,.13*a) - G(t,.175,.006,.12*a) + G(t,.205,.007,.85*a) - G(t,.235,.007,.1*a);
    if(t>.24&&t<.50) y += .30*a*Math.pow(Math.sin(((t-.24)/.26)*Math.PI*.6),.4);
    y += G(t,.42,.040,.45*a);
    return y;
  },
  stemi_post: (t, p) => {
    const a = p.amp||1;
    let y = G(t,.09,.012,.14*a) - G(t,.175,.005,.06*a) + G(t,.205,.007,.95*a) - G(t,.235,.007,.12*a);
    if(t>.24&&t<.45) y -= .25*a*Math.pow(Math.sin(((t-.24)/.21)*Math.PI*.7),.5);
    y += G(t,.42,.028,.35*a);
    return y;
  },
  nstemi: (t, p) => {
    const a = p.amp||1;
    let y = G(t,.09,.012,.14*a) - G(t,.175,.005,.07*a) + G(t,.205,.007,.9*a) - G(t,.235,.007,.2*a);
    if(t>.24&&t<.4) y -= .2*a*Math.pow(Math.sin(((t-.24)/.16)*Math.PI*.7),.5);
    y -= G(t,.42,.030,.22*a);
    return y;
  },
  wellens: (t, p) => {
    const a = p.amp||1;
    return G(t,.09,.012,.14*a) - G(t,.175,.005,.07*a) + G(t,.205,.007,.95*a) - G(t,.235,.007,.2*a) - G(t,.40,.032,.45*a);
  },
  dewinter: (t, p) => {
    const a = p.amp||1;
    let y = G(t,.09,.012,.12*a) - G(t,.175,.005,.08*a) + G(t,.205,.007,.85*a) - G(t,.235,.007,.22*a);
    if(t>.24&&t<.38) y -= .18*a*(1-(t-.24)/.14);
    y += G(t,.42,.030,.55*a);
    return y;
  },
  afib: (t, p, gT) => {
    const a = p.amp||1;
    let y = 0;
    for(const f of [5.1,7.3,9.8,13.2]) y += .04*Math.sin(2*Math.PI*f*gT+f*1.3);
    y += -G(t,.10,.006,.08*a) + G(t,.13,.008,1*a) - G(t,.16,.007,.22*a) + G(t,.30,.029,.23*a);
    return y;
  },
  aflutter: (t, p, gT) => {
    const a = p.amp||1;
    let y = .18*a*Math.sin(2*Math.PI*5*gT); // sawtooth-like flutter waves
    y += -G(t,.10,.006,.07*a) + G(t,.13,.008,1*a) - G(t,.16,.007,.20*a) + G(t,.30,.028,.22*a);
    return y;
  },
  svt: (t, p) => {
    const a = p.amp||1;
    return -G(t,.06,.005,.04*a) + G(t,.09,.007,1*a) - G(t,.12,.006,.18*a) + G(t,.24,.025,.2*a) - G(t,.14,.008,.08*a);
  },
  wpw: (t, p) => {
    const a = p.amp||1;
    let y = G(t,.08,.012,.14*a);
    // delta wave (slurred upstroke)
    if(t>.13&&t<.19) y += .4*a*((t-.13)/.06);
    y += G(t,.20,.010,.7*a) - G(t,.26,.010,.15*a) + G(t,.40,.032,.25*a);
    return y;
  },
  mat: (t, p) => {
    const a = p.amp||1;
    const pAmp = .08 + .12*Math.sin(p.seed||0 + t*3);
    return G(t,.09,.012,pAmp*a) - G(t,.175,.005,.07*a) + G(t,.205,.007,.9*a) - G(t,.235,.007,.20*a) + G(t,.385,.031,.24*a);
  },
  vt: (t, p) => {
    const a = p.amp||1;
    return G(t,.05,.022,.85*a) - G(t,.13,.018,.55*a) + G(t,.21,.020,.28*a) - G(t,.27,.025,.38*a);
  },
  pvt: (t, p) => {
    const a = p.amp||1, phase = p.phase||0;
    const mod = .5+.5*Math.sin(phase+t*8);
    return (G(t,.05,.022,.85*a) - G(t,.13,.018,.55*a) + G(t,.21,.020,.28*a))*mod - G(t,.27,.025,.38*a)*(1-mod);
  },
  torsades: (t, p, gT) => {
    const a = (p.amp||1) * (.3+.7*Math.abs(Math.sin(2*Math.PI*.6*gT)));
    return G(t,.05,.020,.8*a) - G(t,.12,.018,.5*a) + G(t,.20,.020,.3*a) - G(t,.26,.022,.35*a);
  },
  vf: (t, p, gT) => {
    let y = 0;
    const seeds = [3.2,4.8,6.1,7.5,8.9,5.3,9.2,3.8,6.7,4.1,7.2,8.3,5.7,9.5];
    for(let i=0;i<seeds.length;i++) y += (.15+(i%5)*.1)*Math.sin(2*Math.PI*seeds[i]*gT+i*1.1);
    return y*(.55+.45*Math.sin(2*Math.PI*.85*gT+.5))*(p.amp||.8);
  },
  aivr: (t, p) => {
    const a = p.amp||1;
    return G(t,.05,.018,.6*a) - G(t,.12,.015,.35*a) + G(t,.20,.020,.15*a) - G(t,.35,.035,.20*a);

    const a = p.amp||1;

  },
  hypoCa: (t, p) => {
    const a = p.amp||1;

    let y = G(t,.09,.012,.15*a) - G(t,.175,.005,.08*a) + G(t,.205,.007,.85*a) - G(t,.235,.007,.20*a);
    // reverse tick / scooped ST
    if(t>.24&&t<.45) y -= .18*a*Math.sin(((t-.24)/.21)*Math.PI);
    y += G(t,.48,.025,.10*a);
    return y;

    y -= G(t,.42,.028,.20*a); // negative T
    return y;

    y += -G(t,.175,.005,.08*a) + G(t,.205,.007,.90*a) - G(t,.235,.007,.20*a);

// Default profile generator
function getLeadProfile(patternId) {
  if (leadProfiles[patternId]) return leadProfiles[patternId];
  // Generate default based on NSR-like distribution
  const def = {};
  const scales = {I:.9,II:1,III:.7,aVR:.5,aVL:.6,aVF:.8,V1:.6,V2:.8,V3:1,V4:1,V5:.9,V6:.8};
  for (const l of LEADS) def[l] = { scale: scales[l] || .8, stShift: 0, tInvert: l === "aVR" };
  return def;
}

/* ═══════════════════════════════════════════════════════════════
   12-LEAD CANVAS RENDERER
   ═══════════════════════════════════════════════════════════════ */
function render12Lead(canvas, pattern, patientIdx) {
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  // Background
  ctx.fillStyle = "#FFF8F0";
  ctx.fillRect(0, 0, W, H);

  // Layout: 4 columns x 3 rows + rhythm strip
  const cols = 4, rows = 3;
  const margin = { top: 28, left: 36, right: 8, bottom: 40 };
  const cellW = (W - margin.left - margin.right) / cols;
  const cellH = (H - margin.top - margin.bottom - 36) / (rows + 0.6); // extra for rhythm
  const leadLayout = [
    ["I","aVR","V1","V4"],
    ["II","aVL","V2","V5"],
    ["III","aVF","V3","V6"],
  ];

  const gFn = gen[pattern.gen];
  if (!gFn) return;
  const patient = pattern.patients[patientIdx] || pattern.patients[0];
  const hr = patient.hr || 72;
  const rr = 60 / hr;
  const profile = getLeadProfile(pattern.id || pattern.gen);

  // Header
  ctx.fillStyle = "#444";
  ctx.font = "bold 11px system-ui";
  ctx.fillText(`12 Derivasyon EKG  ·  HR: ${hr}/dk  ·  25mm/s  ·  10mm/mV`, margin.left, 16);
  ctx.fillStyle = "#999";
  ctx.font = "10px system-ui";
  ctx.fillText(`Hasta ${patientIdx + 1}`, W - 70, 16);

  // Draw each lead cell
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const leadName = leadLayout[r][c];
      const x = margin.left + c * cellW;
      const y = margin.top + r * cellH;
      const lp = profile[leadName] || defaultLead;

      // Cell border
      ctx.strokeStyle = "#E8D0D0";
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, cellW, cellH);

      // Mini grid
      const gs = cellW / 12;
      ctx.strokeStyle = "#F5E0E0";
      ctx.lineWidth = 0.2;
      for (let gx = x; gx < x + cellW; gx += gs) { ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gx, y + cellH); ctx.stroke(); }
      for (let gy = y; gy < y + cellH; gy += gs) { ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x + cellW, gy); ctx.stroke(); }
      ctx.strokeStyle = "#E8C0C0";
      ctx.lineWidth = 0.4;
      for (let gx = x; gx < x + cellW; gx += gs * 5) { ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gx, y + cellH); ctx.stroke(); }

      // Lead label
      ctx.fillStyle = "#B5272B";
      ctx.font = "bold 9px system-ui";
      ctx.fillText(leadName, x + 3, y + 11);

      // Draw ECG trace
      const midY = y + cellH * 0.5;
      const ampS = cellH * 0.35 * (lp.scale || 1);
      const dur = 2.5;
      const invertMul = lp.tInvert ? -1 : 1;
      const stS = (lp.stShift || 0) * cellH * 0.35;

      ctx.strokeStyle = "#0D1B2A";
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      let started = false;

      if (pattern.continuous) {
        for (let i = 0; i < cellW; i++) {
          const t = (i / cellW) * dur;
          const val = gFn(t, patient, t) * ampS * invertMul * 0.6;
          const py = midY - val - stS;
          if (!started) { ctx.moveTo(x + i, py); started = true; } else ctx.lineTo(x + i, py);
        }
      } else if (pattern.irregular) {
        const rrList = pattern.rrIntervals || [.5,.6,.4,.7,.5];
        for (let i = 0; i < cellW; i++) {
          const gT = (i / cellW) * dur;
          let localT = null, tempStart = 0.1, ti = 0;
          while (tempStart < dur && ti < 20) {
            const rv = rrList[ti % rrList.length];
            if (gT >= tempStart && gT < tempStart + rv) { localT = gT - tempStart; break; }
            tempStart += rv; ti++;
          }
          let py = midY;
          if (localT !== null) py = midY - gFn(localT, patient, gT) * ampS * invertMul - stS;
          if (!started) { ctx.moveTo(x + i, py); started = true; } else ctx.lineTo(x + i, py);
        }
      } else {
        let beatStart = 0.08;
        while (beatStart < dur) {
          for (let i = 0; i < cellW; i++) {
            const gT = (i / cellW) * dur;
            if (gT >= beatStart && gT < beatStart + rr) {
              const localT = gT - beatStart;
              const noise = Math.sin(i * 7.3 + r * 3.1) * 0.005;
              const val = (gFn(localT, patient, gT) + noise) * ampS * invertMul;
              const py = midY - val - stS;
              if (!started) { ctx.moveTo(x + i, py); started = true; } else ctx.lineTo(x + i, py);
            }
          }
          beatStart += rr;
        }
      }
      ctx.stroke();
    }
  }

  // Rhythm strip (Lead II, full width)
  const rsY = margin.top + rows * cellH + 8;
  const rsH = cellH * 0.55;
  ctx.strokeStyle = "#E8D0D0";
  ctx.lineWidth = 0.5;
  ctx.strokeRect(margin.left, rsY, W - margin.left - margin.right, rsH);
  ctx.fillStyle = "#B5272B";
  ctx.font = "bold 9px system-ui";
  ctx.fillText("II (ritim)", margin.left + 3, rsY + 11);

  const rsMidY = rsY + rsH * 0.5;
  const rsAmp = rsH * 0.35;
  const rsW = W - margin.left - margin.right;
  const rsDur = 6;
  ctx.strokeStyle = "#0D1B2A";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  let rsStarted = false;

  if (pattern.continuous) {
    for (let i = 0; i < rsW; i++) {
      const t = (i / rsW) * rsDur;
      const py = rsMidY - gFn(t, patient, t) * rsAmp * 0.6;
      if (!rsStarted) { ctx.moveTo(margin.left + i, py); rsStarted = true; } else ctx.lineTo(margin.left + i, py);
    }
  } else if (pattern.irregular) {
    const rrList = pattern.rrIntervals || [.5,.6,.4,.7,.5];
    for (let i = 0; i < rsW; i++) {
      const gT = (i / rsW) * rsDur;
      let localT = null, tempStart = 0.1, ti = 0;
      while (tempStart < rsDur && ti < 30) {
        const rv = rrList[ti % rrList.length];
        if (gT >= tempStart && gT < tempStart + rv) { localT = gT - tempStart; break; }
        tempStart += rv; ti++;
      }
      let py = rsMidY;
      if (localT !== null) py = rsMidY - gFn(localT, patient, gT) * rsAmp;
      if (!rsStarted) { ctx.moveTo(margin.left + i, py); rsStarted = true; } else ctx.lineTo(margin.left + i, py);
    }
  } else {
    let beatStart = 0.1;
    while (beatStart < rsDur) {
      for (let i = 0; i < rsW; i++) {
        const gT = (i / rsW) * rsDur;
        if (gT >= beatStart && gT < beatStart + rr) {
          const localT = gT - beatStart;
          const py = rsMidY - gFn(localT, patient, gT) * rsAmp;
          if (!rsStarted) { ctx.moveTo(margin.left + i, py); rsStarted = true; } else ctx.lineTo(margin.left + i, py);
        }
      }
      beatStart += rr;
    }
  }
  ctx.stroke();
}

/* ═══════════════════════════════════════════════════════════════
   CANVAS RENDERERS — Single lead (paper style)
   ═══════════════════════════════════════════════════════════════ */
function renderPaperECG(canvas, pattern, patientIdx, opts = {}) {
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;

  // Paper background
  ctx.fillStyle = "#FFF8F0";
  ctx.fillRect(0, 0, w, h);

  // Grid
  const gs = w / 50;
  ctx.strokeStyle = "#F0D0D0";
  ctx.lineWidth = 0.3;
  for (let x = 0; x < w; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = 0; y < h; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
  ctx.strokeStyle = "#E0A0A0";
  ctx.lineWidth = 0.7;
  for (let x = 0; x < w; x += gs * 5) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = 0; y < h; y += gs * 5) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

  const gFn = gen[pattern.gen];
  if (!gFn) return;
  const patient = pattern.patients[patientIdx] || pattern.patients[0];
  const hr = patient.hr || 72;
  const rr = 60 / hr;
  const dur = 5.5;
  const midY = h * 0.48;
  const amp = h * 0.30;

  // Generate and draw
  ctx.strokeStyle = "#0D1B2A";
  ctx.lineWidth = 1.4;
  ctx.beginPath();

  const isIrregular = pattern.irregular;
  const isContinuous = pattern.continuous;
  let started = false;

  if (isContinuous) {
    for (let i = 0; i < w; i++) {
      const t = (i / w) * dur;
      const y = midY - gFn(t, patient, t) * amp * 0.7;
      if (!started) { ctx.moveTo(i, y); started = true; } else ctx.lineTo(i, y);
    }
  } else if (isIrregular) {
    const rrList = pattern.rrIntervals || [.5,.6,.4,.7,.5];
    let beatStart = 0.15;
    let rrIdx = 0;
    for (let i = 0; i < w; i++) {
      const gT = (i / w) * dur;
      let localT = null;
      let tempStart = 0.15;
      let ti = 0;
      while (tempStart < dur && ti < 30) {
        const rrVal = rrList[ti % rrList.length] * (0.85 + 0.3 * (patient.amp || 1) / 1.1);
        if (gT >= tempStart && gT < tempStart + rrVal) { localT = gT - tempStart; break; }
        tempStart += rrVal; ti++;
      }
      let y = midY;
      if (localT !== null) y = midY - gFn(localT, patient, gT) * amp;
      else y = midY - (Math.random() - 0.5) * 3;
      if (!started) { ctx.moveTo(i, y); started = true; } else ctx.lineTo(i, y);
    }
  } else {
    let beatStart = 0.15;
    while (beatStart < dur) {
      for (let i = 0; i < w; i++) {
        const gT = (i / w) * dur;
        if (gT >= beatStart && gT < beatStart + rr) {
          const localT = gT - beatStart;
          const noise = (Math.sin(i * 7.3) * 0.008 + Math.sin(i * 13.7) * 0.005) * (patient.noise || .008) * 100;
          const y = midY - (gFn(localT, patient, gT) + noise) * amp;
          if (!started) { ctx.moveTo(i, y); started = true; } else ctx.lineTo(i, y);
        }
      }
      beatStart += rr;
    }
  }
  ctx.stroke();

  // Label
  if (opts.showLabel !== false) {
    ctx.fillStyle = "#666";
    ctx.font = "10px system-ui";
    ctx.fillText(`${pattern.lead} · ${hr > 0 ? hr + "/dk" : "---"} · 25mm/s · Hasta ${patientIdx + 1}`, 8, h - 6);
  }
}

  const [patientIdx, setPatientIdx] = useState(0);
  const [viewMode, setViewMode] = useState("single"); // "single" or "12lead"

  if (selPattern) {
    const p = selPattern;
    const cat = CATEGORIES.find(c => c.id === p.cat);
    return (
      <div style={{ maxWidth: 1000, margin: "0 auto", padding: "24px 20px" }}>
        <button onClick={() => { setSelPattern(null); setPatientIdx(0); setViewMode("single"); }}
          style={{ fontFamily: sansFont, fontSize: 13, color: CL.sub, background: "none", border: "none", cursor: "pointer", marginBottom: 16 }}>
          ← {cat?.name || "Geri"}
        </button>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16 }}>
          <span style={{ background: cat?.color || CL.blue, color: "white", padding: "4px 10px", borderRadius: 4, fontSize: 11, fontFamily: sansFont }}>{cat?.name}</span>
          <h2 style={{ fontFamily: font, fontSize: 22, color: CL.text, margin: 0 }}>{p.name}</h2>
          <span style={{ fontSize: 12, color: CL.sub }}>{"★".repeat(p.difficulty)}{"☆".repeat(3 - p.difficulty)}</span>
        </div>
        <p style={{ fontFamily: sansFont, fontSize: 14, color: CL.sub, margin: "0 0 20px", lineHeight: 1.6 }}>{p.desc}</p>

        {/* ECG View */}
        <div style={{ background: CL.card, border: `1px solid ${CL.border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontFamily: sansFont, fontSize: 12, fontWeight: 600, color: CL.text }}>Hasta {patientIdx + 1} / {p.patients.length}</span>
              {/* View mode toggle */}
              <div style={{ display: "flex", background: CL.blueLight, borderRadius: 6, padding: 2 }}>
                <button onClick={() => setViewMode("single")}
                  style={{
                    fontFamily: sansFont, fontSize: 11, fontWeight: 600, padding: "5px 12px", borderRadius: 4, border: "none", cursor: "pointer",
                    background: viewMode === "single" ? CL.blue : "transparent",
                    color: viewMode === "single" ? "white" : CL.blue,
                  }}>Tek Strip</button>
                <button onClick={() => setViewMode("12lead")}
                  style={{
                    fontFamily: sansFont, fontSize: 11, fontWeight: 600, padding: "5px 12px", borderRadius: 4, border: "none", cursor: "pointer",
                    background: viewMode === "12lead" ? CL.blue : "transparent",
                    color: viewMode === "12lead" ? "white" : CL.blue,
                  }}>12 Derivasyon</button>
              </div>
            </div>
            <div style={{ display: "flex", gap: 4 }}>
              {p.patients.map((_, i) => (
                <button key={i} onClick={() => setPatientIdx(i)}
                  style={{
                    width: 28, height: 28, borderRadius: 6, fontSize: 11, fontFamily: sansFont,
                    background: i === patientIdx ? CL.blue : CL.blueLight,
                    color: i === patientIdx ? "white" : CL.blue,
                    border: "none", cursor: "pointer", fontWeight: 600,
                  }}>{i + 1}</button>
              ))}
            </div>
          </div>
          {viewMode === "single" 
            ? <ECGCanvas pattern={p} patientIdx={patientIdx} height={200} />
            : <ECG12LeadCanvas pattern={p} patientIdx={patientIdx} />
          }
        </div>

        {/* Info Grid */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <div style={{ background: CL.blueLight, borderRadius: 10, padding: 20, border: `1px solid ${CL.blue}22` }}>
            <div style={{ fontFamily: sansFont, fontSize: 12, fontWeight: 700, color: CL.blue, marginBottom: 10, letterSpacing: .5 }}>TANI KRİTERLERİ</div>
            {p.criteria.map((c, i) => (
              <div key={i} style={{ fontFamily: sansFont, fontSize: 13, color: CL.text, padding: "5px 0", borderBottom: i < p.criteria.length - 1 ? `1px solid ${CL.blue}15` : "none" }}>
                <span style={{ color: CL.blue, marginRight: 8 }}>•</span>{c}
              </div>
            ))}
          </div>
          <div style={{ background: CL.greenLight, borderRadius: 10, padding: 20, border: `1px solid ${CL.green}22` }}>
            <div style={{ fontFamily: sansFont, fontSize: 12, fontWeight: 700, color: CL.green, marginBottom: 10, letterSpacing: .5 }}>NE YAPMALI?</div>
            <p style={{ fontFamily: sansFont, fontSize: 13, color: CL.text, lineHeight: 1.7, margin: 0 }}>{p.treatment}</p>
          </div>
        </div>
      </div>
    );
  }

  if (selCat) {
    const cat = CATEGORIES.find(c => c.id === selCat);
    const catPatterns = patterns.filter(p => p.cat === selCat);
    return (
      <div style={{ maxWidth: 1000, margin: "0 auto", padding: "24px 20px" }}>
        <button onClick={() => setSelCat(null)}
          style={{ fontFamily: sansFont, fontSize: 13, color: CL.sub, background: "none", border: "none", cursor: "pointer", marginBottom: 16 }}>← Kategoriler</button>
        <h2 style={{ fontFamily: font, fontSize: 24, color: cat?.color || CL.text, margin: "0 0 20px" }}>{cat?.icon} {cat?.name}</h2>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280, 1fr))", gap: 12 }}>
          {catPatterns.map(p => (
            <button key={p.id} onClick={() => setSelPattern(p)}
              style={{
                background: CL.card, border: `1px solid ${CL.border}`, borderRadius: 10,
                padding: 0, cursor: "pointer", textAlign: "left", overflow: "hidden", transition: "all .2s",
              }}
              onMouseEnter={e => e.currentTarget.style.borderColor = cat?.color || CL.blue}
              onMouseLeave={e => e.currentTarget.style.borderColor = CL.border}>
              <div style={{ padding: "12px 16px 8px" }}>
                <div style={{ fontFamily: font, fontSize: 15, fontWeight: 700, color: CL.text }}>{p.name}</div>
                <div style={{ fontFamily: sansFont, fontSize: 11, color: CL.sub, marginTop: 2 }}>{p.lead} · {"★".repeat(p.difficulty)}{"☆".repeat(3-p.difficulty)} · {p.patients.length} örnek</div>
              </div>
              <div style={{ padding: "0 12px 12px" }}>
                <ECGCanvas pattern={p} patientIdx={0} height={100} showLabel={false} />
              </div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 1000, margin: "0 auto", padding: "32px 20px" }}>
      <h2 style={{ fontFamily: font, fontSize: 26, color: CL.text, margin: "0 0 8px" }}>Öğren</h2>
      <p style={{ fontFamily: sansFont, fontSize: 14, color: CL.sub, margin: "0 0 24px" }}>Kategori seç, her ritmi incele.</p>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220, 1fr))", gap: 12 }}>
        {CATEGORIES.map(cat => {
          const count = patterns.filter(p => p.cat === cat.id).length;
          return (
            <button key={cat.id} onClick={() => setSelCat(cat.id)}
              style={{
                background: CL.card, border: `2px solid ${cat.color}20`, borderRadius: 10,
                padding: 24, cursor: "pointer", textAlign: "left", transition: "all .2s",
              }}
              onMouseEnter={e => e.currentTarget.style.borderColor = cat.color}
              onMouseLeave={e => e.currentTarget.style.borderColor = cat.color + "20"}>
              <div style={{ fontSize: 24, marginBottom: 8 }}>{cat.icon}</div>
              <div style={{ fontFamily: font, fontSize: 16, fontWeight: 700, color: cat.color }}>{cat.name}</div>
              <div style={{ fontFamily: sansFont, fontSize: 12, color: CL.sub, marginTop: 4 }}>{count} pattern</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ── TEST ── */
function Test() {
  const [queue, setQueue] = useState([]);
  const [idx, setIdx] = useState(0);
  const [answer, setAnswer] = useState(null);
  const [score, setScore] = useState({ c: 0, t: 0 });
  const [started, setStarted] = useState(false);
  const [testView, setTestView] = useState("single");
  const [history, setHistory] = useState([]);

  const startQuiz = useCallback((catId) => {
    const pool = catId ? patterns.filter(p => p.cat === catId) : [...patterns];
    const shuffled = pool.sort(() => Math.random() - .5).slice(0, 15);
    setQueue(shuffled);
    setIdx(0);
    setAnswer(null);
    setScore({ c: 0, t: 0 });
    setStarted(true);
    setHistory([]);
  }, []);

  // ALL hooks must be called before any return
  const current = queue[idx] || null;
  const patIdx = useMemo(() => current ? Math.floor(Math.random() * current.patients.length) : 0, [current, idx]);
  const options = useMemo(() => {
    if (!current) return [];
    const others = patterns.filter(p => p.id !== current.id).sort(() => Math.random() - .5).slice(0, 3);
    return [current, ...others].sort(() => Math.random() - .5).map(o => o.name);
  }, [current]);
  const isCorrect = answer && current ? answer === current.name : false;

  const handleAnswer = (opt) => {
    if (answer || !current) return;
    setAnswer(opt);
    const correct = opt === current.name;
    setScore(s => ({ c: s.c + (correct ? 1 : 0), t: s.t + 1 }));
    setHistory(h => [...h, { pattern: current.name, correct, userAnswer: opt }]);
  };

  // ── Not started: show category selection
  if (!started) {
    return (
      <div style={{ maxWidth: 800, margin: "0 auto", padding: "32px 20px" }}>
        <h2 style={{ fontFamily: font, fontSize: 26, color: CL.text, margin: "0 0 8px" }}>Test Et</h2>
        <p style={{ fontFamily: sansFont, fontSize: 14, color: CL.sub, margin: "0 0 24px" }}>Quiz modunu seç. 15 rastgele soru.</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180, 1fr))", gap: 10 }}>
          <button onClick={() => startQuiz(null)}
            style={{ background: CL.blue, color: "white", border: "none", borderRadius: 10, padding: 20, cursor: "pointer", textAlign: "left" }}>
            <div style={{ fontFamily: font, fontSize: 16, fontWeight: 700 }}>Karışık</div>
            <div style={{ fontSize: 12, opacity: .8, marginTop: 4 }}>Tüm kategoriler</div>
          </button>
          {CATEGORIES.map(cat => (
            <button key={cat.id} onClick={() => startQuiz(cat.id)}
              style={{ background: CL.card, border: `2px solid ${cat.color}30`, borderRadius: 10, padding: 20, cursor: "pointer", textAlign: "left", transition: "all .2s" }}
              onMouseEnter={e => e.currentTarget.style.borderColor = cat.color}
              onMouseLeave={e => e.currentTarget.style.borderColor = cat.color + "30"}>
              <div style={{ fontFamily: font, fontSize: 14, fontWeight: 700, color: cat.color }}>{cat.icon} {cat.name}</div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  if (idx >= queue.length) {
    const pct = score.t > 0 ? Math.round((score.c / score.t) * 100) : 0;
    const grade = pct >= 90 ? "Mükemmel!" : pct >= 70 ? "İyi" : pct >= 50 ? "Geliştirilmeli" : "Tekrar Et";
    const gradeColor = pct >= 90 ? CL.green : pct >= 70 ? CL.blue : pct >= 50 ? CL.gold : CL.red;
    const wrongs = history.filter(h => !h.correct);
    return (
      <div style={{ maxWidth: 600, margin: "0 auto", padding: "40px 20px" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ fontFamily: font, fontSize: 56, fontWeight: 700, color: gradeColor }}>%{pct}</div>
          <div style={{ fontFamily: sansFont, fontSize: 18, color: gradeColor, fontWeight: 600, marginBottom: 4 }}>{grade}</div>
          <div style={{ fontFamily: sansFont, fontSize: 14, color: CL.sub }}>{score.c} / {score.t} doğru cevap</div>
        </div>

        {/* History breakdown */}
        <div style={{ background: CL.card, border: `1px solid ${CL.border}`, borderRadius: 10, padding: 16, marginBottom: 20 }}>
          <div style={{ fontFamily: sansFont, fontSize: 11, fontWeight: 700, color: CL.sub, letterSpacing: .5, marginBottom: 10 }}>SORU DETAYI</div>
          {history.map((h, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: i < history.length - 1 ? `1px solid ${CL.border}` : "none" }}>
              <span style={{ fontSize: 14, width: 20 }}>{h.correct ? "✓" : "✗"}</span>
              <span style={{ fontFamily: sansFont, fontSize: 13, color: CL.text, flex: 1 }}>{h.pattern}</span>
              {!h.correct && <span style={{ fontFamily: sansFont, fontSize: 11, color: CL.red }}>Senin cevabın: {h.userAnswer}</span>}
            </div>
          ))}
        </div>

        {/* Weak areas */}
        {wrongs.length > 0 && (
          <div style={{ background: CL.redLight, border: `1px solid ${CL.red}25`, borderRadius: 10, padding: 16, marginBottom: 20 }}>
            <div style={{ fontFamily: sansFont, fontSize: 11, fontWeight: 700, color: CL.red, letterSpacing: .5, marginBottom: 8 }}>TEKRAR ÇALIŞ</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {wrongs.map((w, i) => (
                <span key={i} style={{ background: "white", border: `1px solid ${CL.red}30`, borderRadius: 4, padding: "4px 10px", fontSize: 12, color: CL.red }}>{w.pattern}</span>
              ))}
            </div>
          </div>
        )}

        <button onClick={() => { setStarted(false); setHistory([]); }}
          style={{ width: "100%", fontFamily: sansFont, background: CL.blue, color: "white", border: "none", borderRadius: 8, padding: "14px", fontSize: 14, cursor: "pointer", fontWeight: 600 }}>
          Tekrar Dene
        </button>
      </div>
    );
  }

  // ── Quiz active
  if (!current) return null;

  return (
    <div style={{ maxWidth: 800, margin: "0 auto", padding: "24px 20px" }}>
      {/* Progress bar */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
        <div style={{ flex: 1, background: CL.border, borderRadius: 4, height: 6 }}>
          <div style={{ width: `${((idx + 1) / queue.length) * 100}%`, background: CL.blue, borderRadius: 4, height: 6, transition: "width .3s" }} />
        </div>
        <span style={{ fontFamily: sansFont, fontSize: 12, color: CL.sub }}>{idx + 1}/{queue.length}</span>
        <span style={{ fontFamily: sansFont, fontSize: 12, color: CL.green, fontWeight: 600 }}>{score.c}✓</span>
      </div>

      {/* Clinical Scenario */}
      {current.scenario && (
        <div style={{ background: CL.goldLight, border: `1px solid ${CL.gold}30`, borderRadius: 10, padding: "14px 18px", marginBottom: 12 }}>
          <div style={{ fontFamily: sansFont, fontSize: 10, fontWeight: 700, color: CL.gold, letterSpacing: 1, marginBottom: 6 }}>KLİNİK SENARYO</div>
          <div style={{ fontFamily: sansFont, fontSize: 13.5, color: CL.text, lineHeight: 1.6 }}>{current.scenario}</div>
        </div>
      )}

      {/* ECG */}
      <div style={{ background: CL.card, border: `1px solid ${CL.border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div style={{ fontFamily: sansFont, fontSize: 11, color: CL.sub }}>
            {current.lead} · {"★".repeat(current.difficulty)}
          </div>
          <div style={{ display: "flex", background: CL.blueLight, borderRadius: 6, padding: 2 }}>
            <button onClick={() => setTestView("single")}
              style={{
                fontFamily: sansFont, fontSize: 10, fontWeight: 600, padding: "4px 10px", borderRadius: 4, border: "none", cursor: "pointer",
                background: testView === "single" ? CL.blue : "transparent",
                color: testView === "single" ? "white" : CL.blue,
              }}>Strip</button>
            <button onClick={() => setTestView("12lead")}
              style={{
                fontFamily: sansFont, fontSize: 10, fontWeight: 600, padding: "4px 10px", borderRadius: 4, border: "none", cursor: "pointer",
                background: testView === "12lead" ? CL.blue : "transparent",
                color: testView === "12lead" ? "white" : CL.blue,
              }}>12D</button>
          </div>
        </div>
        {testView === "single"
          ? <ECGCanvas pattern={current} patientIdx={patIdx} height={200} />
          : <ECG12LeadCanvas pattern={current} patientIdx={patIdx} />
        }
      </div>

      {/* Options */}
      <div style={{ fontFamily: sansFont, fontSize: 12, color: CL.sub, marginBottom: 8, fontWeight: 600, letterSpacing: .5 }}>TANIN NEDİR?</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
        {options.map(opt => {
          let bg = CL.card, border = CL.border, textColor = CL.text;
          if (answer) {
            if (opt === current.name) { bg = CL.greenLight; border = CL.green; textColor = CL.green; }
            else if (opt === answer && !isCorrect) { bg = CL.redLight; border = CL.red; textColor = CL.red; }
            else { bg = "#F5F5F5"; textColor = "#AAA"; }
          }
          return (
            <button key={opt} onClick={() => handleAnswer(opt)} disabled={!!answer}
              style={{
                fontFamily: sansFont, fontSize: 13, fontWeight: 500, color: textColor,
                background: bg, border: `1.5px solid ${border}`, borderRadius: 8,
                padding: "14px 16px", cursor: answer ? "default" : "pointer",
                textAlign: "left", transition: "all .2s",
              }}>{opt}</button>
          );
        })}
      </div>

      {/* Feedback */}
      {answer && (
        <div style={{ animation: "fadeIn .3s ease" }}>
          <div style={{
            background: isCorrect ? CL.greenLight : CL.redLight,
            border: `1px solid ${isCorrect ? CL.green : CL.red}`,
            borderRadius: 10, padding: 20, marginBottom: 12,
          }}>
            <div style={{ fontFamily: sansFont, fontSize: 15, fontWeight: 700, color: isCorrect ? CL.green : CL.red, marginBottom: 10 }}>
              {isCorrect ? "✓ Doğru" : "✗ Yanlış"} — {current.name}
            </div>
            <p style={{ fontFamily: sansFont, fontSize: 13, color: CL.text, lineHeight: 1.6, margin: "0 0 12px" }}>{current.desc}</p>
            {/* Criteria tags */}
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
              {current.criteria.map((c, i) => (
                <span key={i} style={{
                  background: CL.blueLight, border: `1px solid ${CL.blue}30`, borderRadius: 4,
                  padding: "4px 10px", fontSize: 11, fontFamily: sansFont, color: CL.blue, fontWeight: 500,
                }}>{c}</span>
              ))}
            </div>
            {/* Treatment */}
            <div style={{ background: "white", borderRadius: 8, padding: 14, border: `1px solid ${CL.green}25` }}>
              <div style={{ fontFamily: sansFont, fontSize: 11, fontWeight: 700, color: CL.green, letterSpacing: .5, marginBottom: 6 }}>NE YAPMALI?</div>
              <p style={{ fontFamily: sansFont, fontSize: 13, color: CL.text, lineHeight: 1.6, margin: 0 }}>{current.treatment}</p>
            </div>
          </div>
          <button onClick={() => { setIdx(idx + 1); setAnswer(null); setTestView("single"); }}
            style={{
              width: "100%", fontFamily: sansFont, background: CL.blue, color: "white",
              border: "none", borderRadius: 8, padding: 14, fontSize: 14, fontWeight: 600, cursor: "pointer",
            }}>
            {idx < queue.length - 1 ? "Sonraki →" : "Sonuçları Gör"}
          </button>
        </div>
      )}
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [page, setPage] = useState("menu");
  return (
    <div style={{ minHeight: "100vh", background: CL.bg, fontFamily: sansFont }}>
      <Header onNav={setPage} current={page} />
      {page === "menu" && <Home onNav={setPage} />}
      {page === "learn" && <Learn onNav={setPage} />}
      {page === "test" && <Test />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
